name: Bloom
options:
  bundleIdPrefix: app.bloomtracker
  deploymentTarget:
    iOS: "26.0"
  developmentLanguage: en
  createIntermediateGroups: true
  groupSortPosition: top
  generateEmptyDirectories: true
  xcodeVersion: "26.0"
settings:
  base:
    SWIFT_VERSION: "5.10"
    IPHONEOS_DEPLOYMENT_TARGET: "26.0"
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    SWIFT_STRICT_CONCURRENCY: minimal
targets:
  Bloom:
    type: application
    platform: iOS
    deploymentTarget: "26.0"
    sources:
      - path: Bloom
        excludes:
          - "**/.DS_Store"
          - "Features/Backup/**"
    resources:
      - path: Bloom/Resources/Assets.xcassets
      - path: Bloom/Resources/Fonts
        optional: true
    entitlements:
      path: Bloom/Resources/Bloom.entitlements
    info:
      path: Bloom/Resources/Info.plist
      properties:
        CFBundleDisplayName: Bloom Tracker
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        LSRequiresIPhoneOS: true
        UILaunchScreen:
          UIColorName: MidnightAbyss
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UIRequiredDeviceCapabilities:
          - arm64
          - still-camera
        NSCameraUsageDescription: "Bloom Tracker uses the camera to take your progress photos. They stay on this device."
        ITSAppUsesNonExemptEncryption: false
        CFBundleURLTypes:
          - CFBundleURLSchemes:
              - bloom
            CFBundleURLName: app.bloomtracker.Bloom.capture
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.bloomtracker.Bloom
        TARGETED_DEVICE_FAMILY: "1"
        GENERATE_INFOPLIST_FILE: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        DEVELOPMENT_TEAM: "N5PS6LW9NY"
        CODE_SIGN_STYLE: Automatic
        SUPPORTS_MACCATALYST: NO
        SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: NO
        CODE_SIGN_ENTITLEMENTS: Bloom/Resources/Bloom.entitlements

  BloomTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "26.0"
    sources:
      - path: BloomTests
    dependencies:
      - target: Bloom
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.bloomtracker.BloomTests
        GENERATE_INFOPLIST_FILE: YES
